<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAIO Insight — 2026 Execution Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
:root{
  --ink:#070D1A;--ink2:#0C1526;--ink3:#132038;--ink4:#1A2C4A;
  --muted:#5E7399;--xmuted:#344B6E;
  --paper:#F0F4FA;--paper2:#E4EBF5;--paper3:#D4DCEA;
  --white:#fff;--acid:#FF6B2B;--teal:#00C8A0;--red:#FF4D6D;--amber:#FFB830;
  --logo:"Barlow Condensed",sans-serif;
  --body:"Space Grotesk",sans-serif;
  --mono:"IBM Plex Mono",monospace;
  --r:8px;--rl:16px;
}
body{font-family:var(--body);background:var(--ink);color:var(--paper);line-height:1.6;min-height:100vh}

/* ── TOPBAR ── */
.topbar{background:#000;border-bottom:2px solid var(--acid);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-logo{font-family:var(--logo);font-size:20px;font-weight:700;color:var(--paper);letter-spacing:2px;display:flex;align-items:center;gap:10px}
.tb-dots{display:grid;grid-template-columns:repeat(3,5px);gap:3px}
.tb-dots span{width:5px;height:5px;border-radius:50%;background:var(--acid)}
.tb-dots span:nth-child(1),.tb-dots span:nth-child(2),.tb-dots span:nth-child(4),.tb-dots span:nth-child(6),.tb-dots span:nth-child(8),.tb-dots span:nth-child(9){opacity:.18}
.tb-dots span:nth-child(3){opacity:.95}
.tb-dots span:nth-child(5){opacity:.55}
.tb-dots span:nth-child(7){opacity:.22}
.tb-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}
.tb-right{display:flex;align-items:center;gap:1rem}
.tb-progress{font-family:var(--mono);font-size:11px;color:var(--acid)}
.tb-reset{font-family:var(--mono);font-size:10px;color:var(--xmuted);cursor:pointer;padding:4px 8px;border:1px solid var(--ink3);border-radius:4px;background:none;transition:all .15s}
.tb-reset:hover{border-color:var(--red);color:var(--red)}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 52px)}

/* ── SIDEBAR ── */
.sidebar{background:var(--ink2);border-right:1px solid var(--ink3);padding:1.25rem 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--ink3);border-radius:2px}
.sb-section{margin-bottom:.25rem}
.sb-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--xmuted);padding:.5rem 1.25rem .25rem;display:block}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1.25rem;cursor:pointer;transition:background .12s;gap:.5rem;border-left:2px solid transparent}
.sb-item:hover{background:var(--ink3)}
.sb-item.active{background:var(--ink3);border-left-color:var(--acid)}
.sb-item-name{font-size:12px;color:var(--paper);font-weight:500;line-height:1.35}
.sb-item-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px}
.sb-badge{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.badge-done{background:rgba(0,200,160,.15);color:var(--teal)}
.badge-partial{background:rgba(255,184,48,.12);color:var(--amber)}
.badge-todo{background:rgba(94,115,153,.1);color:var(--muted)}

/* ── MAIN ── */
.main{padding:2rem 2rem 4rem;max-width:820px}
.section-hero{margin-bottom:2rem}
.section-hero h1{font-family:var(--logo);font-size:2rem;font-weight:700;letter-spacing:1px;color:var(--paper);margin-bottom:.3rem}
.section-hero .meta{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:1.5rem;flex-wrap:wrap}
.section-hero .meta span strong{color:var(--acid)}

/* ── PHASE HEADER ── */
.phase-header{background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.phase-header h2{font-family:var(--logo);font-size:1.3rem;font-weight:700;letter-spacing:1px;color:var(--paper)}
.phase-theme{font-family:var(--mono);font-size:11px;color:var(--muted);font-style:italic;margin-top:.15rem}
.phase-prog{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem}
.phase-prog-bar{width:120px;height:6px;background:var(--ink3);border-radius:3px;overflow:hidden}
.phase-prog-fill{height:100%;background:var(--acid);border-radius:3px;transition:width .3s}
.phase-prog-label{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* ── WEEK BLOCK ── */
.week-block{background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--rl);margin-bottom:1rem;overflow:hidden}
.week-header{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s}
.week-header:hover{background:var(--ink3)}
.week-header-left{display:flex;align-items:center;gap:.75rem}
.week-title{font-size:.95rem;font-weight:600;color:var(--paper)}
.week-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}
.week-chev{color:var(--muted);transition:transform .2s;flex-shrink:0}
.week-chev.open{transform:rotate(180deg)}
.week-body{display:none;border-top:1px solid var(--ink3)}
.week-body.open{display:block}
.week-output{padding:.75rem 1.25rem;background:rgba(255,107,43,.04);border-top:1px solid rgba(255,107,43,.12);font-size:12px;color:var(--muted);font-style:italic;line-height:1.6}
.week-output strong{color:var(--acid);font-style:normal}

/* ── TASK GROUP ── */
.task-group{padding:.75rem 1.25rem}
.tg-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.tg-label.must{color:var(--red)}
.tg-label.should{color:var(--amber)}
.tg-label.batch{color:var(--teal)}
.tg-label.milestone{color:var(--acid)}
.tg-label.daily{color:#A78BFA}
.tg-label::before{content:"";display:block;width:10px;height:1.5px}
.tg-label.must::before{background:var(--red)}
.tg-label.should::before{background:var(--amber)}
.tg-label.batch::before{background:var(--teal)}
.tg-label.milestone::before{background:var(--acid)}
.tg-label.daily::before{background:#A78BFA}

/* ── TASK ITEM ── */
.task-item{display:flex;align-items:flex-start;gap:.75rem;padding:.45rem .5rem;border-radius:var(--r);margin-bottom:.15rem;cursor:pointer;transition:background .12s}
.task-item:hover{background:var(--ink3)}
.task-item.done{opacity:.5}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--ink4);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
.task-item.done .task-cb{background:var(--teal);border-color:var(--teal)}
.task-cb svg{display:none}
.task-item.done .task-cb svg{display:block}
.task-text{font-size:13px;color:var(--paper);line-height:1.55}
.task-sub{font-size:11px;color:var(--muted);line-height:1.5;margin-top:.2rem;padding-left:.1rem}

/* ── INFO BLOCK ── */
.info-block{background:var(--ink3);border-radius:var(--r);padding:.85rem 1rem;margin:.5rem 0;font-size:12px;color:var(--muted);line-height:1.7}
.info-block strong{color:var(--paper)}
.info-block.warn{border-left:3px solid var(--red)}
.info-block.tip{border-left:3px solid var(--acid)}
.info-block.note{border-left:3px solid var(--teal)}

/* ── DAILY SECTION ── */
.daily-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.daily-card{background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--rl);padding:1rem 1.1rem}
.daily-card h3{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem}
.daily-card h3::before{content:"";display:block;width:8px;height:8px;border-radius:50%}
.daily-card.morning h3::before{background:#A78BFA}
.daily-card.ongoing h3::before{background:var(--teal)}
.daily-step{display:flex;align-items:flex-start;gap:.6rem;padding:.3rem 0}
.daily-step-num{font-family:var(--mono);font-size:10px;color:var(--acid);font-weight:600;flex-shrink:0;min-width:14px}
.daily-step-text{font-size:12px;color:var(--paper);line-height:1.55}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;margin:.5rem 0 1rem}
.data-table th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 10px;border-bottom:1px solid var(--ink3);text-align:left}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--ink3);color:var(--muted);line-height:1.5}
.data-table tr:last-child td{border-bottom:none}
.data-table td:first-child{color:var(--paper);font-weight:500}
.data-table .highlight{color:var(--acid);font-weight:600}

/* ── MILESTONE TABLE ── */
.milestone-table{width:100%;border-collapse:collapse;font-size:12px;margin:.5rem 0}
.milestone-table th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 10px;border-bottom:1px solid var(--ink3);text-align:left}
.milestone-table td{padding:8px 10px;border-bottom:1px solid var(--ink3);vertical-align:top}
.milestone-table tr:last-child td{border-bottom:none}
.month-badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--ink3);color:var(--acid);min-width:60px;text-align:center}
.milestone-text{font-size:12px;color:var(--paper);line-height:1.5}
.rev-target{font-family:var(--mono);font-size:11px;color:var(--teal)}

/* ── AFFILIATE TABLE ── */
.affiliate-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem .85rem;background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--r);margin-bottom:.4rem}
.affiliate-row.enrolled{border-color:rgba(0,200,160,.25)}
.aff-name{font-size:13px;font-weight:500;color:var(--paper)}
.aff-comm{font-family:var(--mono);font-size:10px;color:var(--acid)}
.aff-when{font-family:var(--mono);font-size:10px;color:var(--muted)}
.aff-est{font-family:var(--mono);font-size:10px;color:var(--teal)}
.aff-cb-wrap{display:flex;align-items:center;gap:.4rem;cursor:pointer}
.aff-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--ink4);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.aff-cb.checked{background:var(--teal);border-color:var(--teal)}
.aff-cb-label{font-family:var(--mono);font-size:9px;color:var(--muted)}
.aff-cb.checked + .aff-cb-label{color:var(--teal)}

/* ── STACK TABLE ── */
.stack-item{display:grid;grid-template-columns:140px 1fr auto;gap:.5rem;padding:.6rem .85rem;background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--r);margin-bottom:.35rem;align-items:center}
.stack-tool{font-size:12px;font-weight:500;color:var(--paper)}
.stack-purpose{font-size:12px;color:var(--muted)}
.stack-cost{font-family:var(--mono);font-size:11px;color:var(--teal)}

/* ── SIGNAL 0 ── */
.signal0-steps{display:grid;gap:.5rem}
.s0-step{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--r);cursor:pointer;transition:border-color .15s}
.s0-step:hover{border-color:var(--ink4)}
.s0-step.done{border-color:rgba(0,200,160,.25)}
.s0-num{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--acid);flex-shrink:0;min-width:18px}
.s0-text{font-size:12px;color:var(--paper);line-height:1.55}
.s0-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--ink4);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;margin-left:auto}
.s0-step.done .s0-check{background:var(--teal);border-color:var(--teal)}

/* ── CONTENT CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.5rem}
.cal-cell{background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--r);padding:.65rem .75rem}
.cal-week{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.cal-item{font-size:11px;color:var(--paper);line-height:1.5;margin-bottom:.25rem}
.cal-item.empty{color:var(--xmuted)}
.cal-tag{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;margin-bottom:.2rem}
.cal-tag.data{background:rgba(255,107,43,.12);color:var(--acid)}
.cal-tag.narrative{background:rgba(0,200,160,.1);color:var(--teal)}
.cal-tag.newsletter{background:rgba(167,139,250,.1);color:#A78BFA}

/* ── FORECAST BAR ── */
.forecast-bars{display:flex;flex-direction:column;gap:.4rem;margin:.75rem 0}
.fbar-row{display:flex;align-items:center;gap:.75rem}
.fbar-label{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:55px;text-align:right}
.fbar-track{flex:1;height:16px;background:var(--ink3);border-radius:3px;overflow:hidden}
.fbar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;transition:width .5s}
.fbar-value{font-family:var(--mono);font-size:9px;color:#fff;font-weight:600;white-space:nowrap}

/* ── SCROLLBAR ── */
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--ink3);border-radius:3px}

@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .daily-grid{grid-template-columns:1fr}
  .cal-grid{grid-template-columns:1fr 1fr}
  .stack-item{grid-template-columns:1fr;gap:.2rem}
}
</style>
</head>

let checked = {};
let activeSection = 'daily';

function loadState() {
  try { checked = JSON.parse(localStorage.getItem('caio_exec_plan') || '{}'); } catch(e) { checked = {}; }
}
function saveState() {
  localStorage.setItem('caio_exec_plan', JSON.stringify(checked));
}
function toggle(id) {
  checked[id] = !checked[id];
  saveState();
  document.querySelectorAll(`[data-task-id="${id}"]`).forEach(el => {
    el.classList.toggle('done', !!checked[id]);
  });
  updateProgress();
  updateSidebarBadges();
}
function confirmReset() {
  if(confirm('Reset ALL checkboxes? This cannot be undone.')) {
    checked = {};
    saveState();
    renderAll();
  }
}

const CHECK_SVG = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function taskItem(task, typeClass) {
  const done = !!checked[task.id];
  const sub = task.sub ? `<div class="task-sub">${task.sub.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : '';
  return `<div class="task-item${done?' done':''}" data-task-id="${task.id}" onclick="toggle('${task.id}')">
    <div class="task-cb">${done?CHECK_SVG:''}</div>
    <div><div class="task-text">${task.text}</div>${sub}</div>
  </div>`;
}

function taskGroup(tasks, label, typeClass, tasks_key) {
  if(!tasks || !tasks.length) return '';
  const items = tasks.map(t => taskItem(t, typeClass)).join('');
  return `<div class="task-group"><div class="tg-label ${typeClass}"><span>${label}</span></div>${items}</div>`;
}

function sectionTaskCount(sectionTasks) {
  let total=0, done=0;
  const allTypes = ['must','should','batch','milestone'];
  allTypes.forEach(t => { if(sectionTasks[t]) sectionTasks[t].forEach(task => { total++; if(checked[task.id]) done++; }); });
  return {total, done};
}

function allTaskCount() {
  let total=0, done=0;
  Object.values(PLAN.tasks).forEach(sec => {
    ['must','should','batch','milestone'].forEach(t => {
      if(sec[t]) sec[t].forEach(task => { total++; if(checked[task.id]) done++; });
    });
  });
  // Also count affiliates, signal0
  AFFILIATES.forEach(a => { total++; if(checked[a.id]) done++; });
  SIGNAL0.forEach(s => { total++; if(checked[s.id]) done++; });
  MILESTONES.forEach(m => { total++; if(checked['ms-'+m.month]) done++; });
  return {total, done};
}

function badgeFor(ids) {
  let total=0, done=0;
  ids.forEach(id => {
    const sec = PLAN.tasks[id];
    if(sec) { ['must','should','batch','milestone'].forEach(t => { if(sec[t]) sec[t].forEach(task => { total++; if(checked[task.id]) done++; }); }); }
  });
  if(total===0) return '';
  if(done===0) return `<span class="sb-badge badge-todo">0/${total}</span>`;
  if(done===total) return `<span class="sb-badge badge-done">✓ ${total}</span>`;
  return `<span class="sb-badge badge-partial">${done}/${total}</span>`;
}

function updateProgress() {
  const {total, done} = allTaskCount();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-label').textContent = `${done}/${total} · ${pct}%`;
}

function updateSidebarBadges() {
  PLAN.sections.forEach(sec => {
    const badgeEl = document.getElementById('sb-badge-'+sec.id);
    if(!badgeEl) return;
    const ids = sec.subsections.map(s=>s.id);
    badgeEl.outerHTML = `<span id="sb-badge-${sec.id}">${badgeFor(ids)}</span>`;
  });
}

function renderWeekBlock(sub) {
  const t = PLAN.tasks[sub.id] || {};
  const mustHtml = taskGroup(t.must, 'MUST DO', 'must');
  const shouldHtml = taskGroup(t.should, 'SHOULD DO', 'should');
  const batchHtml = taskGroup(t.batch, 'BATCH', 'batch');
  const msHtml = taskGroup(t.milestone, 'MILESTONE CHECK', 'milestone');
  const outputHtml = sub.output ? `<div class="week-output"><strong>Week output:</strong> ${sub.output}</div>` : '';
  const metaStr = [sub.hours?`~${sub.hours} hrs/week`:'', sub.revenue?`Target: ${sub.revenue}`:''].filter(Boolean).join(' · ');
  return `<div class="week-block" id="wb-${sub.id}">
    <div class="week-header" onclick="toggleWeek('${sub.id}')">
      <div class="week-header-left">
        <span class="week-title">${sub.title}</span>
        ${metaStr?`<span class="week-meta">${metaStr}</span>`:''}
      </div>
      <svg class="week-chev" id="wc-${sub.id}" width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
    </div>
    <div class="week-body" id="wbody-${sub.id}">
      ${mustHtml}${shouldHtml}${batchHtml}${msHtml}${outputHtml}
    </div>
  </div>`;
}

function toggleWeek(id) {
  const body = document.getElementById('wbody-'+id);
  const chev = document.getElementById('wc-'+id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  chev.classList.toggle('open',!isOpen);
}

    <div style="display:grid;grid-template-columns:140px 1fr auto;gap:.3rem .5rem;margin-bottom:.4rem;padding:0 .85rem">
      <span style="font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Tool</span>
      <span style="font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Purpose</span>
      <span style="font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Cost</span>
    </div>
    ${rows}`;
}

function renderSignal0() {
  const items = SIGNAL0.map(s => {
    const done = !!checked[s.id];
    const sub = s.sub ? `<div style="font-size:11px;color:var(--muted);margin-top:.2rem">${s.sub}</div>` : '';
    return `<div class="s0-step${done?' done':''}" data-task-id="${s.id}" onclick="toggle('${s.id}')">
      <div class="s0-num">⚡</div>
      <div style="flex:1"><div class="s0-text">${s.text}</div>${sub}</div>
      <div class="s0-check">${done?CHECK_SVG:''}</div>
    </div>`;
  }).join('');
  return `
    <div class="section-hero"><h1>Signal 0 Weekly Checklist</h1>
      <div class="meta"><span>Run every week before any client work</span><span>If any check fails: fix before running a single audit</span></div>
    </div>
    <div class="info-block warn"><strong>This is the pre-flight check.</strong> If Cloudflare is blocking OAI-SearchBot, all other GEO work is irrelevant until it is fixed. Your credibility as a GEO diagnostic service depends on your own site passing Signal 0.</div>
    <div class="signal0-steps" style="margin-top:1rem">${items}</div>`;
}

function renderContent() {
  const weeks = [
    { week:'Week 1', p1:'Index finding: [category] VAS scores', p1type:'data', p2:null, nl:'Issue goes out' },
    { week:'Week 2', p1:'Signal 0 stat (22% of web blocked)', p1type:'data', p2:null, nl:null },
    { week:'Week 3', p1:'AI conversion stat (5× higher rate)', p1type:'data', p2:'Case study (anonymized)', p2type:'narrative', nl:null },
    { week:'Week 4', p1:'Competitor gap finding from index', p1type:'data', p2:null, nl:null }
  ];
  const cells = weeks.map(w => `<div class="cal-cell">
    <div class="cal-week">${w.week}</div>
    ${w.p1?`<span class="cal-tag ${w.p1type}">${w.p1type.toUpperCase()}</span><div class="cal-item">${w.p1}</div>`:''}
    ${w.p2?`<span class="cal-tag ${w.p2type}">${w.p2type.toUpperCase()}</span><div class="cal-item">${w.p2}</div>`:''}
    ${w.nl?`<span class="cal-tag newsletter">NEWSLETTER</span><div class="cal-item">${w.nl}</div>`:'<div class="cal-item empty">—</div>'}
  </div>`).join('');
  return `
    <div class="section-hero"><h1>Content Calendar Template</h1>
      <div class="meta"><span>Monthly repeating structure</span><span>Post format: problem → data → cause → diagnostic → intake link in <strong>first comment</strong></span></div>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="info-block tip" style="margin-top:.75rem"><strong>Post format rule:</strong> Problem in line 1. Data in line 2. Structural cause in lines 3–5. Diagnostic reference in lines 6–7. <strong>Intake link goes in the first comment only</strong> — LinkedIn deprioritizes posts with external links in the body.</div>`;
}

function renderForecast() {
  const maxVal = FORECAST[FORECAST.length-1].arr;
  const bars = FORECAST.map(f => {
    const pct = Math.max(2, (f.arr/maxVal*100));
    const label = f.arr >= 1000000 ? '$'+Math.round(f.arr/100000)/10+'M' : '$'+Math.round(f.arr/1000)+'K';
    return `<div class="fbar-row">
      <div class="fbar-label">${f.period}</div>
      <div class="fbar-track"><div class="fbar-fill" style="width:${pct}%;background:${f.color}"><span class="fbar-value">${label}</span></div></div>
    </div>`;
  }).join('');
  const tableRows = [
    ['Q1 Y1','$10,800','—'],['Q2 Y1','$28,949','$2,000'],['Q3 Y1','$60,337','$6,000'],['Q4 Y1','$85,811','$10,000'],
    ['Y1 Total','$185,897','—'],['Y2','$685,804','$57,150'],['Y3','$1,398,780 ✦','$116,565'],
    ['Y5','$4,270,024 ◆','$355,835'],['Y10','$10,352,820','$862,735']
  ].map((r,i) => `<tr style="${[4,7,8].includes(i)?'background:var(--ink2)':''}"><td style="${i===4||i===7||i===8?'color:var(--acid);font-weight:700':''}">${r[0]}</td><td class="highlight" style="text-align:right">${r[1]}</td><td style="text-align:right;color:var(--teal);font-family:var(--mono);font-size:11px">${r[2]}</td></tr>`).join('');
  return `
    <div class="section-hero"><h1>Revenue Forecast</h1>
      <div class="meta"><span>Y1 quarterly → Y2–Y10 annual</span><span>✦ Exit window opens Y3 &nbsp; ◆ Exit range $8M–$60M at Y5</span></div>
    </div>
    <div class="forecast-bars">${bars}</div>
    <table class="data-table" style="margin-top:1.25rem">
      <thead><tr><th>Period</th><th style="text-align:right">Revenue</th><th style="text-align:right">MRR</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="info-block note" style="margin-top:.75rem">Assumptions: 5 audits/week by Q3 · 3 retainers by Q4 · Index at 50 brands by Q4 · AI token cost $0.09/audit (negligible). Variance tolerance: ±20% before adjusting the plan.</div>`;
}

// ══════════════════════════════════════════════════════
// SIDEBAR + NAVIGATION
// ══════════════════════════════════════════════════════
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  PLAN.sections.forEach(sec => {
    html += `<div class="sb-section">`;
    if(sec.sub || sec.label) {
      html += `<span class="sb-label">${sec.label}${sec.sub?` · ${sec.sub}`:''}</span>`;
    }
    sec.subsections.forEach(sub => {
      const allIds = [sub.id];
      html += `<div class="sb-item${activeSection===sub.id?' active':''}" id="sb-${sub.id}" onclick="navigate('${sub.id}')">
        <div><div class="sb-item-name">${sub.title||sec.label}</div>${sub.hours||sub.revenue?`<div class="sb-item-sub">${sub.hours?`~${sub.hours}h`:''}${sub.hours&&sub.revenue?' · ':''}${sub.revenue||''}</div>`:''}
        </div>
        <span id="sb-badge-${sub.id}">${badgeFor(allIds)}</span>
      </div>`;
    });
    html += `</div>`;
  });
  // Special sections
  ['ms-table','aff-table','stack-table','signal0-check','content-cal','forecast-bars'].forEach(id => {
    const badges = document.getElementById('sb-badge-'+id);
    if(badges) badges.outerHTML = `<span id="sb-badge-${id}">${badgeFor([id])}</span>`;
  });
  sidebar.innerHTML = html;
}

function navigate(id) {
  activeSection = id;
  // Update sidebar active state
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const sbEl = document.getElementById('sb-'+id);
  if(sbEl) sbEl.classList.add('active');
  renderMain(id);
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderMain(id) {
  const main = document.getElementById('main');
  // Find what this id belongs to
  if(id === 'daily-morning') { main.innerHTML = renderDaily(); return; }
  if(id === 'ms-table') { main.innerHTML = renderMilestones(); return; }
  if(id === 'aff-table') { main.innerHTML = renderAffiliates(); return; }
  if(id === 'stack-table') { main.innerHTML = renderStack(); return; }
  if(id === 'signal0-check') { main.innerHTML = renderSignal0(); return; }
  if(id === 'content-cal') { main.innerHTML = renderContent(); return; }
  if(id === 'forecast-bars') { main.innerHTML = renderForecast(); return; }
  // Phase sections
  for(const sec of PLAN.sections) {
    if(sec.subsections.some(s=>s.id===id)) {
      if(sec.subsections.length > 1 || PLAN.tasks[id]) {
        // Single week or group — check if parent phase
        const isSingleWeek = PLAN.tasks[id] !== undefined;
        if(isSingleWeek) {
          // Find parent and render the sub only
          const sub = sec.subsections.find(s=>s.id===id);
          main.innerHTML = `<div class="section-hero"><h1>${sub.title}</h1><div class="meta">${sub.hours?`<span><strong>~${sub.hours} hrs</strong></span>`:''} ${sub.revenue?`<span>Target: <strong>${sub.revenue}</strong></span>`:''}</div></div>${renderWeekBlock(sub)}`;
        } else {
          main.innerHTML = renderPhase(sec);
        }
        return;
      }
      main.innerHTML = renderPhase(sec);
      return;
    }
  }
}

function renderAll() {
  loadState();
  renderSidebar();
  renderMain(activeSection);
  updateProgress();
}

// Boot
renderAll();
// Auto-open first week
setTimeout(() => { const wb = document.getElementById('wbody-w1'); const wc = document.getElementById('wc-w1'); if(wb && wc){ wb.classList.add('open'); wc.classList.add('open'); } }, 100);
</script>
</body>
